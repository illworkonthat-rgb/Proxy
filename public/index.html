<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Proxy Engine</title>
    <style>
        body { font-family: sans-serif; background: #0b0f19; color: #f3f4f6; max-width: 900px; margin: 50px auto; padding: 20px; text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .search-box { margin: 30px 0; }
        input { width: 70%; padding: 14px; font-size: 16px; border: 2px solid #1e293b; border-radius: 8px; background: #111827; color: white; outline: none; }
        button { padding: 14px 28px; font-size: 16px; font-weight: bold; background: #0284c7; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: #111827; padding: 20px; border: 1px solid #1e293b; border-radius: 12px; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .card h3 { margin: 0 0 10px 0; color: #38bdf8; }
        .card p { margin: 0; font-size: 14px; color: #9ca3af; }
    </style>
</head>
<body>

    <h1>Unrestricted Web Gateway</h1>
    <p style="color: #6b7280;">Bypasses standard frame controls and connection drops.</p>

    <div class="search-box">
        <input type="text" id="urlInput" placeholder="Enter site domain (e.g., wikipedia.org)">
        <button onclick="launch()">Launch</button>
    </div>

    <div class="grid">
        <div class="card" onclick="quickLaunch('wikipedia.org')">
            <h3>Wikipedia</h3>
            <p>Test layout performance</p>
        </div>
        <div class="card" onclick="quickLaunch('example.com')">
            <h3>Example Domain</h3>
            <p>Verify network path</p>
        </div>
    </div>

    <script>
        function launch() {
            let target = document.getElementById('urlInput').value.trim();
            if (!target) return alert('Please enter a target site URL');
            if (!/^https?:\/\//i.test(target)) { target = 'https://' + target; }
            window.location.href = '/proxy?url=' + encodeURIComponent(target);
        }
        function quickLaunch(url) {
            window.location.href = '/proxy?url=' + encodeURIComponent('https://' + url);
        }
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') launch();
        });
    </script>
</body>
</html>
