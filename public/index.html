<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Proxy Gateway</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        .search-box {
            display: flex;
            background: #1e293b;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            outline: none;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #334155;
            text-decoration: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <a href="/" class="home-btn">🏠 Home</a>
    
    <div class="container">
        <form id="proxy-form">
            <div class="search-box">
                <input type="text" id="url-input" placeholder="Search with DuckDuckGo or enter URL..." autocomplete="off">
                <button type="submit">Go</button>
            </div>
        </form>
    </div>

    <!-- Core Scripts - Ensure these files exist in /public/uv/ -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="/index.js"></script>
</body>
</html>
